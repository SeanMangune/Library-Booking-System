<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2563eb">
  <title>SmartSpace Offline</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background: linear-gradient(145deg, #eff6ff, #f8fafc);
      color: #0f172a;
      padding: 24px;
    }
    .card {
      width: min(520px, 100%);
      background: white;
      border: 1px solid #dbeafe;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 20px 40px -24px rgba(37, 99, 235, 0.4);
      text-align: center;
    }
    h1 { margin: 0 0 10px; font-size: 1.4rem; }
    p { margin: 0; color: #334155; line-height: 1.5; }
    a {
      display: inline-block;
      margin-top: 16px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>You are offline</h1>
    <p>SmartSpace cannot reach the network right now. Reconnect and try again.</p>
    <a href="/login">Try again</a>
  </main>
</body>
</html>
